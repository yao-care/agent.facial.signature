<!doctype html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <link rel="manifest" href="./manifest.json">
  <title>警示監看</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 0; }
    #app { display: flex; flex-direction: column; height: 100vh; }
    video { max-width: 100%; max-height: 80vh; background: #000; }
    .error, .readonly { padding: 40px; text-align: center; font-size: 18px; color: #dc2626; }
  </style>
</head>
<body>
  <div id="app"></div>
  <footer style="padding:16px 24px;font-size:13px;color:#555;border-top:1px solid #e5e7eb;line-height:1.8;">
    <strong>警示模式流程</strong><br>
    比對對象：僅警示名單成員（config 的 watchlistId 指定）<br>
    看到不在名單者：靜默，不記錄<br>
    看到名單成員：跳出警示 popup，播放警示音效，寫入警示紀錄<br>
    看到模糊臉：跳出警示 popup 待 review，不自動建檔
  </footer>
  <script type="module">
    import { registerSW } from './shared/sw-register.js';
    import { runAlert } from './shared/face-alert-template.js';
    registerSW();
    const config = await fetch('./configs/example-watchlist.json').then(r => r.json());
    runAlert(config, document.getElementById('app'));
  </script>
</body>
</html>
