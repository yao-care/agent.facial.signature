<!doctype html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <link rel="manifest" href="./manifest.json">
  <title>簽到</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 0; }
    #app { display: flex; flex-direction: column; height: 100vh; }
    video { max-width: 100%; max-height: 80vh; background: #000; }
    .error, .readonly { padding: 40px; text-align: center; font-size: 18px; color: #dc2626; }
  </style>
</head>
<body>
  <div id="app"></div>
  <footer style="padding:16px 24px;font-size:13px;color:#555;border-top:1px solid #e5e7eb;line-height:1.8;">
    <strong>簽到模式流程</strong><br>
    比對對象：DB 中所有已建檔人員<br>
    看到新人：自動建檔，TTS 播報「歡迎」<br>
    看到已建檔者：TTS 播報姓名，寫入簽到紀錄<br>
    看到模糊臉：寫入 event 待管理員在「紀錄」tab review
  </footer>
  <script type="module">
    import { registerSW } from './shared/sw-register.js';
    import { runCheckin } from './shared/face-checkin-template.js';
    registerSW();
    const config = await fetch('./configs/example-checkin.json').then(r => r.json());
    runCheckin(config, document.getElementById('app'));
  </script>
</body>
</html>
